<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create new project simply</title>
    <script type="module" src="/main.js" defer></script>
  <body>
    <form action="create-project" id="projectCreate">
      <input type="text" id="projectName">
      <select name="project-language" id="projectLanguage">
        <option value="rust">Rust</option>
        <option value="html">HTML</option>
        <option value="go">Go</option>
        <option value="python">Python</option>
        <option value="lua">lua</option>
        <option value="assembly">assembly</option>
      </select>
      <input type="checkbox" name="js" id="projectJsBool">
      <select name="project-subfolder" id="projectSubfolder"></select>
      <button type="submit" id="projectCreateSubmit">Create project</button>
    </form>
    <p id="debugText"></p>
  </body>
</html>
