<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create new project simply</title>
    <script type="module" src="/main.js" defer></script>

  <body oncontextmenu="return false">
    <form action="create-project" id="projectCreate">
      <input type="text" id="projectName" required placeholder="Enter the project name">
      <select name="project-language" id="projectLanguage">
        <option value="rust">Rust</option>
        <option value="html">HTML</option>
        <option value="go">Go</option>
        <option value="python">Python</option>
        <option value="lua">lua</option>
        <option value="assembly">assembly</option>
      </select>
      <input type="checkbox" name="js" id="projectJsBool">
      <select name="project-subfolder" id="projectSubfolder"></select>
      <button type="submit" id="projectCreateSubmit">Create project</button>
    </form>
    <form action="configuration" id="configuration">
      <input id="projectFolderPath" type="text" placeholder="Enter a path" required>
          <select name="chosen-editor" id="chosenEditor">
            <option value="code">Visual Studio Code</option>
            <option value="subl">Sublime Text</option>
            <option value="start notepad++">Notepad++</option>
            <option value="idea">Intelij</option>
          </select>
          <button type="submit" id="projectConfigurationButton">Save configuration</button>
          <p id="configError"></p>
    </form>
    <p id="debugText"></p>
    <div data-tauri-drag-region class="titlebar">
      <h1>CNPS</h1>
      <div class="titlebar-button" id="titlebar-minimize">
      </div>
      <div class="titlebar-button" id="titlebar-maximize">
      </div>
      <div class="titlebar-button" id="titlebar-close">
      </div>
    </div>
    <script type="module">
      import { appWindow } from '@tauri-apps/api/window'
document
  .getElementById('titlebar-minimize')
  .addEventListener('click', () => appWindow.minimize())
document
  .getElementById('titlebar-maximize')
  .addEventListener('click', () => appWindow.toggleMaximize())
document
  .getElementById('titlebar-close')
  .addEventListener('click', () => appWindow.close())
    </script>
  </body>
</html>
